name: Atualização diária do ranking

on:
  schedule:
    - cron: '0 6 * * *'  # 03:00 BRT (UTC-3)
  workflow_dispatch:      # permite rodar manualmente

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Coletar dados
        run: python src/scraper/collect.py

      - name: Calcular scores
        run: python src/scoring/score.py

      - name: Gerar detalhes dos deputados
        run: python src/site/build_details.py

      - name: Salvar artefatos como artefato
        uses: actions/upload-artifact@v4
        with:
          name: ranking-json
          path: |
            docs/ranking.json
            docs/deputados/
          retention-days: 1

  publicar:
    runs-on: ubuntu-latest
    needs: coletar

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar artefatos
        uses: actions/download-artifact@v4
        with:
          name: ranking-json
          path: docs/

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ranking.json docs/deputados/
          git diff --cached --quiet || git commit -m "Atualização automática — $(date -u '+%Y-%m-%d')"
          git pull --rebase
          git push
